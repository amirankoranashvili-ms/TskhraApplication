{% extends "sqladmin/layout.html" %} {% block content %}

<div class="container mt-4" style="max-width: 600px">
  <div class="card">
    <div class="card-header bg-danger text-white">
      <h5 class="mb-0">
        <i class="fa-solid fa-ban me-2"></i>
        Reject Verification Request #{{ verification_request.id }}
      </h5>
    </div>
    <div class="card-body">
      {% if product %}
      <div class="mb-3">
        <strong>Product:</strong>
        {{ product.title }}
        <br />
        <strong>SKU:</strong>
        {{ product.sku }}
        <br />
        <strong>Price:</strong>
        {{ product.price }}
      </div>
      <hr />
      {% endif %} {% if error %}
      <div class="alert alert-danger" role="alert">{{ error }}</div>
      {% endif %}

      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ request.session.get('csrf_token', '') }}">
        <div class="mb-3">
          <label for="rejection_reason" class="form-label">
            Rejection Reason
            <span class="text-danger">*</span>
          </label>
          <textarea
            class="form-control"
            id="rejection_reason"
            name="rejection_reason"
            rows="4"
            required
            placeholder="Enter the reason for rejection..."></textarea>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-danger">
            <i class="fa-solid fa-ban me-1"></i>
            Reject
          </button>
          <a
            href="{{ request.url_for('admin:list', identity='verification-request-db') }}"
            class="btn btn-secondary">
            Cancel
          </a>
        </div>
      </form>
    </div>
  </div>
</div>

{% endblock %}
