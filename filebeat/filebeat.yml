filebeat.inputs:
  - type: filestream
    id: modulith-logs
    enabled: true
    paths:
      - /app/logs/modulith*.log
    parsers:
      - ndjson:
          keys_under_root: true
          overwrite_keys: true
          add_error_key: true
          expand_keys: true

output.elasticsearch:
  hosts: ["http://elasticsearch:9200"]
  index: "modulith-logs-%{+yyyy.MM.dd}"

setup.ilm.enabled: false
setup.template.name: "modulith-logs"
setup.template.pattern: "modulith-logs-*"
setup.template.settings:
  index.number_of_shards: 1
  index.number_of_replicas: 0

logging.level: warning
