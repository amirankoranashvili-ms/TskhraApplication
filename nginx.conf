events {
    worker_connections 1024;
}

http {
    server {
        listen 80;

        location /github-webhook/ {
            proxy_pass http://host.docker.internal:9090/github-webhook/;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering off;
        }

        location /kyc/webhook {
            proxy_pass http://modulith:8081/kyc/webhook;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering off;
        }

        location /ws {
            proxy_pass http://modulith:8081/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;   # keep connection alive for 1 hour
            proxy_send_timeout 3600s;
        }

    }
}