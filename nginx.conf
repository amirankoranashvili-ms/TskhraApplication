worker_processes auto;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;
    send_timeout          30s;
    keepalive_timeout     65s;

    proxy_buffering on;
    proxy_buffer_size 8k;
    proxy_buffers 16 8k;

    upstream modulith {
        server modulith:8081;
        keepalive 32;
    }

    upstream products_service {
        server products:8004;
        keepalive 32;
    }

    upstream cart_service {
        server cart:8006;
        keepalive 32;
    }

    upstream payment_service {
        server payment:8007;
        keepalive 32;
    }

    upstream provider_service {
        server provider:8005;
        keepalive 32;
    }

    upstream admin_service {
        server admin:8003;
        keepalive 32;
    }

    server {
        listen 80;
        client_max_body_size 20m;

        # --- Modulith (Spring Boot) ---
        location / {
            proxy_pass http://modulith/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- WebSocket ---
        location /ws {
            proxy_pass http://modulith/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # --- GitHub Webhook ---
        location /github-webhook/ {
            proxy_pass http://host.docker.internal:9090/github-webhook/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
        }

        # --- KYC Webhook ---
        location /kyc/webhook {
            proxy_pass http://modulith/kyc/webhook;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
        }

        # --- Block internal APIs ---
        location /ecommerce/products/internal/ {
            return 403;
        }

        # --- Ecommerce / Products ---
        location /ecommerce/products/ {
            proxy_pass http://products_service/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # --- Ecommerce / Cart ---
        location /ecommerce/cart/ {
            proxy_pass http://cart_service/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # --- Ecommerce / Payment ---
        location /ecommerce/payment/ {
            proxy_pass http://payment_service/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # --- Ecommerce / Provider ---
        location /ecommerce/provider/ {
            proxy_pass http://provider_service/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # --- Admin Panel ---
        location /admin/ {
            proxy_pass http://admin_service/admin/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        }

        location /verification/ {
            proxy_pass http://admin_service/verification/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /uploads/ {
            proxy_pass http://admin_service/uploads/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $http_host;
        }
    }
}
